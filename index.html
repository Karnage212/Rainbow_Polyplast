    function TiltCard({ children, className, style = {} }) {
      const ref = useRef(null);
      const x = useMotionValue(0);
      const y = useMotionValue(0);
      const mouseXSpring = useSpring(x, { stiffness: 150, damping: 15 });
      const mouseYSpring = useSpring(y, { stiffness: 150, damping: 15 });
      const rotateX = useTransform(mouseYSpring, [-0.5, 0.5], ["10deg", "-10deg"]);
      const rotateY = useTransform(mouseXSpring, [-0.5, 0.5], ["-10deg", "10deg"]);
      const [position, setPosition] = useState({ x: 0, y: 0 });
      const [opacity, setOpacity] = useState(0);
      const handleMouseMove = (e) => {
        if (!ref.current) return;
        const rect = ref.current.getBoundingClientRect();
        const width = rect.width;
        const height = rect.height;
        const mouseX = e.clientX - rect.left;
        const mouseY = e.clientY - rect.top;
        x.set(mouseX / width - 0.5);
        y.set(mouseY / height - 0.5);
        setPosition({ x: mouseX, y: mouseY });
      };
      const handleMouseLeave = () => {
        x.set(0);
        y.set(0);
        setOpacity(0);
      };
      return html`
        <${motion.div}
          ref=${ref}
          onMouseMove=${handleMouseMove}
          onMouseEnter=${() => setOpacity(1)}
          onMouseLeave=${handleMouseLeave}
          style=${{ rotateX, rotateY, transformStyle: "preserve-3d", ...style }}
          whileHover=${{ scale: 1.02, zIndex: 10 }}
          className=${"relative group perspective-1000 bg-white shadow-[0_8px_32px_rgba(11,37,69,0.08)] overflow-hidden " + className}
        >
          <div
            className="absolute inset-0 pointer-events-none transition-opacity duration-300 z-0 rounded-[inherit]"
            style=${{
              opacity,
              background: 'radial-gradient(800px circle at ' + position.x + 'px ' + position.y + 'px, rgba(255,105,180,0.08), rgba(0,255,255,0.08) 30%, rgba(255,255,0,0.08) 60%, transparent 80%)'

        <//>
      `;

    function CustomCursor() {
      const [isVisible, setIsVisible] = useState(false);
      const cursorX = useMotionValue(-100);
      const cursorY = useMotionValue(-100);
      useEffect(() => {
        const moveCursor = (e) => {
          cursorX.set(e.clientX);
          cursorY.set(e.clientY);
          if (!isVisible) setIsVisible(true);
        };
        const handleMouseLeave = () => setIsVisible(false);
        const handleMouseEnter = () => setIsVisible(true);
        window.addEventListener('mousemove', moveCursor);
        document.documentElement.addEventListener('mouseleave', handleMouseLeave);
        document.documentElement.addEventListener('mouseenter', handleMouseEnter);
        return () => {
          window.removeEventListener('mousemove', moveCursor);
          document.documentElement.removeEventListener('mouseleave', handleMouseLeave);
          document.documentElement.removeEventListener('mouseenter', handleMouseEnter);
        };
      }, [isVisible]);
      return html`
        <div className="hidden lg:block pointer-events-none z-[100] fixed inset-0">
          <${motion.div}
            className="w-2 h-2 bg-white rounded-full fixed top-0 left-0 -ml-1 -mt-1 shadow-[0_0_10px_rgba(255,255,255,0.8)]"
            style=${{
              x: cursorX,
              y: cursorY,
              opacity: isVisible ? 1 : 0
            }}
          />
          <${motion.div}
            className="w-8 h-8 border border-white/40 rounded-full fixed top-0 left-0 -ml-4 -mt-4"
            style=${{
              x: cursorX,
              y: cursorY,
              opacity: isVisible ? 1 : 0,
              boxShadow: isVisible ? '2px 2px 10px rgba(255, 0, 128, 0.4), -2px -2px 10px rgba(0, 255, 255, 0.4), 2px -2px 10px rgba(255, 255, 0, 0.4), -2px 2px 10px rgba(0, 255, 0, 0.4)' : 'none'
            }}

      `;
