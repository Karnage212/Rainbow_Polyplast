    function TiltCard({ children, className, style = {} }) {
      const ref = useRef(null);
      const x = useMotionValue(0);
      const y = useMotionValue(0);
      const mouseXSpring = useSpring(x, { stiffness: 150, damping: 15 });
      const mouseYSpring = useSpring(y, { stiffness: 150, damping: 15 });
      const [position, setPosition] = useState({ x: 0, y: 0 });
      const [opacity, setOpacity] = useState(0);
      const handleMouseMove = (e) => {
        if (!ref.current) return;
        const rect = ref.current.getBoundingClientRect();
        const width = rect.width;
        const height = rect.height;
        const mouseX = e.clientX - rect.left;
        const mouseY = e.clientY - rect.top;
        x.set(mouseX / width - 0.5);
        y.set(mouseY / height - 0.5);
        setPosition({ x: mouseX, y: mouseY });
      };
      const handleMouseLeave = () => {
        x.set(0);
        y.set(0);
        setOpacity(0);
      };
      return html`
        <${motion.div}
          ref=${ref}
          onMouseMove=${handleMouseMove}
          onMouseEnter=${() => setOpacity(1)}
          onMouseLeave=${handleMouseLeave}
          style=${style}
          className=${"relative group bg-white shadow-[0_8px_32px_rgba(11,37,69,0.08)] overflow-hidden " + className}
        >
          <div
            className="absolute inset-0 pointer-events-none transition-opacity duration-300 z-0 rounded-[inherit]"
            style=${{
              opacity,
              background: 'radial-gradient(800px circle at ' + position.x + 'px ' + position.y + 'px, rgba(255,105,180,0.12), rgba(0,255,255,0.12) 30%, rgba(255,255,0,0.12) 60%, transparent 80%)'
            }}
          ></div>
          <div className="relative z-10 w-full h-full flex flex-col">
            ${children}
          </div>
        <//>
      `;

    function CustomCursor() {
      const [isVisible, setIsVisible] = useState(false);
      const cursorX = useMotionValue(-100);
      const cursorY = useMotionValue(-100);
      const rafRef = useRef(null);
      
      useEffect(() => {
        const moveCursor = (e) => {
          if (rafRef.current) cancelAnimationFrame(rafRef.current);
          rafRef.current = requestAnimationFrame(() => {
            cursorX.set(e.clientX);
            cursorY.set(e.clientY);
            if (!isVisible) setIsVisible(true);
          });
        };
        const handleMouseLeave = () => setIsVisible(false);
        const handleMouseEnter = () => setIsVisible(true);
        window.addEventListener('mousemove', moveCursor);
        document.documentElement.addEventListener('mouseleave', handleMouseLeave);
        document.documentElement.addEventListener('mouseenter', handleMouseEnter);
        return () => {
          window.removeEventListener('mousemove', moveCursor);
          document.documentElement.removeEventListener('mouseleave', handleMouseLeave);
          document.documentElement.removeEventListener('mouseenter', handleMouseEnter);
          if (rafRef.current) cancelAnimationFrame(rafRef.current);
        };
      }, [isVisible]);
      
      return html`
        <div className="hidden lg:block pointer-events-none z-[100] fixed inset-0">
          <${motion.div}
            className="w-2 h-2 bg-white rounded-full fixed top-0 left-0 -ml-1 -mt-1 shadow-[0_0_10px_rgba(255,255,255,0.8)] will-change-transform"

      const [isAutoScrolling, setIsAutoScrolling] = useState(false);
      const activeScrollRef = useRef({ frameId: null, timeoutId: null });
      const mobileVideoRef = useRef(null);
      const lastFrameRef = useRef(0);
      const frameCount = 108;

      useEffect(() => {
        if (isMobile && mobileVideoRef.current) {
          mobileVideoRef.current.play().catch(e => console.log("iOS Auto-play prevented (Low Power Mode)."));
        }
      }, [isMobile]);
      useEffect(() => {
        const checkMobile = () => setIsMobile(window.innerWidth < 768);
        checkMobile();
        window.addEventListener('resize', checkMobile);
        return () => window.removeEventListener('resize', checkMobile);
      }, []);

      const drawImage = (index) => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        const img = imagesRef.current[index];
        if (!img || !img.complete) return;
        const hRatio = canvas.width / img.width;
        const vRatio = canvas.height / img.height;
        const ratio  = Math.max(hRatio, vRatio);
        const centerShift_x = (canvas.width - img.width * ratio) / 2;
        const centerShift_y = (canvas.height - img.height * ratio) / 2;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(img, 0, 0, img.width, img.height,
                      centerShift_x, centerShift_y, img.width * ratio, img.height * ratio);
      };

      useEffect(() => {
        if (isMobile) return;
        
        const img1 = new Image();

        img1.onload = () => requestAnimationFrame(() => drawImage(1));

        const observer = new IntersectionObserver((entries) => {
          if (entries[0].isIntersecting) {
            for (let i = 1; i <= frameCount; i++) {
              if (!imagesRef.current[i]) {
                const img = new Image();
                img.decoding = 'async';
                const paddedIndex = i.toString().padStart(5, '0');

                  requestAnimationFrame(() => {
                    if (imagesRef.current[lastFrameRef.current]?.complete) {
                      drawImage(lastFrameRef.current);

                imagesRef.current[i] = img;
              }
            }
            observer.disconnect();
          }
        }, { threshold: 0.1 });
        if (containerRef.current) observer.observe(containerRef.current);
        
        const handleResize = () => {
          if (canvasRef.current) {
            canvasRef.current.width = window.innerWidth;
            canvasRef.current.height = window.innerHeight;
            requestAnimationFrame(() => drawImage(lastFrameRef.current || 1));
          }
        };
        handleResize();
        window.addEventListener('resize', handleResize);
        
        return () => {
          observer.disconnect();
          window.removeEventListener('resize', handleResize);
        };
      }, [isMobile]);

      const runCinematicScroll = (targetY, duration = 3500) => {
        if (activeScrollRef.current.frameId) cancelAnimationFrame(activeScrollRef.current.frameId);
        if (activeScrollRef.current.timeoutId) clearTimeout(activeScrollRef.current.timeoutId);
        setIsAutoScrolling(true);
        const startY = window.scrollY;
        const distance = targetY - startY;

        const step = (timestamp) => {

          const progress = Math.min(timestamp - start, duration);
          const ease = progress < duration / 2 
            ? 4 * Math.pow(progress / duration, 3) 
            : 1 - Math.pow(-2 * (progress / duration) + 2, 3) / 2;
          window.scrollTo(0, startY + distance * ease);
          if (progress < duration) {
            activeScrollRef.current.frameId = window.requestAnimationFrame(step);
          } else {
            activeScrollRef.current.frameId = null;
            activeScrollRef.current.timeoutId = setTimeout(() => {
              setIsAutoScrolling(false);
              activeScrollRef.current.timeoutId = null;
            }, 1500);
          }
        };
        activeScrollRef.current.frameId = window.requestAnimationFrame(step);
      };

      useEffect(() => {
        const handleDown = () => {
          const productsEl = document.getElementById('products');
          if (productsEl) runCinematicScroll(productsEl.getBoundingClientRect().top + window.scrollY, 3500);
        };
        const handleUp = () => runCinematicScroll(0, 3500);
        window.addEventListener('cinematicScrollDown', handleDown);
        window.addEventListener('cinematicScrollUp', handleUp);
        return () => {
          window.removeEventListener('cinematicScrollDown', handleDown);
          window.removeEventListener('cinematicScrollUp', handleUp);

          if (activeScrollRef.current.timeoutId) clearTimeout(activeScrollRef.current.timeoutId);
